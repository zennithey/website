<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zennithey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000814,#001d3d,#003566);
overflow:hidden;
}

/* Background Animation */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:#00b4ff;
filter:blur(250px);
opacity:.25;
animation:float 8s infinite alternate;
}

@keyframes float{
from{
transform:translate(-150px,-50px);
}
to{
transform:translate(150px,50px);
}
}

.card{
position:relative;
z-index:10;
width:90%;
max-width:430px;
padding:35px;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 50px rgba(0,180,255,.15);
text-align:center;
color:white;
}

.profile{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
margin-bottom:20px;
border:4px solid #00b4ff;
box-shadow:
0 0 20px #00b4ff,
0 0 50px #00b4ff;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
box-shadow:
0 0 30px #00b4ff,
0 0 80px #00b4ff;
}
}

h1{
font-size:32px;
margin-bottom:5px;
}

.bio{
color:#d5d5d5;
margin-bottom:25px;
font-size:14px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
text-decoration:none;
padding:16px;
margin:12px 0;
border-radius:18px;
font-weight:600;
color:white;
transition:.3s;
}

.btn:hover{
transform:translateY(-4px) scale(1.02);
}

.whatsapp{
background:#25D366;
box-shadow:0 0 20px rgba(37,211,102,.4);
}

.instagram{
background:rgba(255,255,255,.12);
}

.github{
background:rgba(255,255,255,.12);
}

.stats{
margin-top:25px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,.08);
}

.counter{
font-size:26px;
font-weight:700;
color:#00b4ff;
}

.footer{
margin-top:20px;
font-size:12px;
color:#bdbdbd;
}

</style>
</head>
<body>

<div class="card">

<img src="Snapchat-602080217.jpg" class="profile">

<h1>zennithey</h1>

<p class="bio">
Personal Website • Digital Creator
</p>

<a class="btn whatsapp"
href="https://wa.me/6283185334593?text=Halo%20zennithey☺️"
target="_blank">
💬 WhatsApp
</a>

<a class="btn instagram"
href="https://www.instagram.com/zennithey_?igsh=dTRqbnJsbGIyY3Jn"
target="_blank">
📷 Instagram
</a>



<div class="stats">
<div>Total Pengunjung</div>
<div class="counter" id="visitor">...</div>
</div>

<div class="footer">
© 2026 Zennithey
</div>

</div>

<script>

fetch("https://api.countapi.xyz/hit/zennithey/profile")
.then(res=>res.json())
.then(data=>{
document.getElementById("visitor").innerHTML=data.value;
});

</script>

</body>
</html>
